name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # corre cada día a medianoche UTC
  workflow_dispatch:        # permite correrlo a mano

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necesario para crear/actualizar la rama output
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: zrdqns
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#FF0000&color_dots=#161b22,#FF0000,#cc0000,#990000,#660000

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
